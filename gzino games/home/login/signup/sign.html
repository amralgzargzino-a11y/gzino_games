<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب</title>
    <link rel="stylesheet" href="sign.css">
</head>

<body>
    <header>
        <h1>إنشاء حساب جديد</h1>
    </header>

    <main>
        <section class="signup-form">
            <h2>معلومات الحساب</h2>
            <form action="#" method="POST">
                <label for="first-name">الاسم الأول:</label>
                <input type="text" id="first-name" name="first-name" placeholder="أدخل اسمك الأول" required>

                <label for="last-name">الاسم الأخير:</label>
                <input type="text" id="last-name" name="last-name" placeholder="أدخل اسمك الأخير" required>

                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>

                <label for="password">كلمة المرور:</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>

                <button type="submit">إنشاء حساب</button>
            </form>
            <p>لديك حساب بالفعل؟ <a href="../login.html">تسجيل الدخول</a></p>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2025 gzino games</p>
    </footer>
</body>

</html>
