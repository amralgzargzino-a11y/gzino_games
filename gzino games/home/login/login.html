<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <header>
        <h1>مميزات تسجيل الدخول</h1>
        <ul>
            <li>إدارة الاكونت بسهولة.</li>
            <li>إمكانية الشات مع اللاعبين الآخرين.</li>
            <li>تواصل أسرع مع فريق المطورين.</li>
        </ul>
    </header>

    <main>
        <section class="login-form">
            <h2>تسجيل الدخول</h2>
            <form action="#" method="POST">
                <label for="username">اسم المستخدم:</label>
                <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>

                <label for="password">كلمة المرور:</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>

                <button type="submit">تسجيل الدخول</button>
            </form>
            <p>ليس لديك حساب؟ <a href="signup/sign.html">إنشاء حساب جديد</a></p>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2025 gzino games</p>
    </footer>
</body>

</html>
